<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>政策相談シミュレーション</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        #game-container {
            background: #fff;
            max-width: 600px;
            width: 100%;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            padding: 30px;
            box-sizing: border-box;
        }
        h1 {
            font-size: 1.5em;
            color: #2c3e50;
            text-align: center;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        #situation-box {
            background: #e8f4f8;
            padding: 20px;
            border-radius: 8px;
            font-size: 1.1em;
            margin-bottom: 25px;
            font-weight: bold;
            line-height: 1.6;
        }
        .option-btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            background: #fff;
            border: 2px solid #bdc3c7;
            border-radius: 8px;
            font-size: 1em;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s;
            line-height: 1.4;
        }
        .option-btn:hover {
            border-color: #3498db;
            background: #f0f8ff;
        }
        .option-btn strong {
            display: block;
            color: #2980b9;
            margin-bottom: 5px;
            font-size: 1.1em;
        }
        #feedback-box {
            display: none;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
            font-size: 1.05em;
            line-height: 1.6;
        }
        .correct {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .incorrect {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        #next-btn {
            display: none;
            width: 100%;
            padding: 15px;
            margin-top: 20px;
            background: #3498db;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
        }
        #next-btn:hover {
            background: #2980b9;
        }
        #finish-screen {
            display: none;
            text-align: center;
        }
        #finish-screen p {
            font-size: 1.2em;
            line-height: 1.6;
        }
    </style>
</head>
<body>

<div id="game-container">
    <h1 id="stage-title">STAGE 1</h1>
    <div id="situation-box">状況を読み込んでいます...</div>
    <div id="options-container"></div>
    <div id="feedback-box"></div>
    <button id="next-btn">次の時代へ進む</button>
    
    <div id="finish-screen">
        <h2>シミュレーション完了！</h2>
        <p>資本主義は危機に直面するたびに、自らを<strong>「修正」</strong>して生き延びてきました。<br>一方、社会主義はイノベーションが起きず<strong>「硬直」</strong>してしまいました。</p>
        <p>さあ、プリントに戻って<br><strong>「本時のまとめ」</strong>を自分の言葉で書いてみましょう！</p>
    </div>
</div>

<script>
    const scenarios = [
        {
            stage: "STAGE 1：1929年 世界恐慌",
            situation: "【緊急事態】株価が大暴落し、街に失業者が溢れています！「見えざる手」に任せても一向に景気が回復しません。総理、誰の意見を採用しますか！？",
            options: [
                {
                    thinker: "アダム・スミス派",
                    text: "政府は何もしなくてよい。市場の「見えざる手」が自然に解決するのを待つべきだ。",
                    isCorrect: false,
                    feedback: "【史実と異なります】放置した結果、不況はさらに長引いてしまいました。「小さな政府」の限界です。"
                },
                {
                    thinker: "ケインズ派",
                    text: "政府が積極的に公共事業を行い、「有効需要」を作り出して雇用を生み出すべきだ！",
                    isCorrect: true,
                    feedback: "【正解！】歴史上、アメリカの「ニューディール政策」などがこれにあたります。政府が市場に介入する「修正資本主義（大きな政府）」へと柔軟に変化し、危機を乗り越えました。"
                },
                {
                    thinker: "マルクス派",
                    text: "資本主義の限界だ！労働者が立ち上がり、国家が全てを計画する社会主義へ移行しよう。",
                    isCorrect: false,
                    feedback: "【史実と異なります】当時ソ連は恐慌を免れましたが、主要な資本主義国は体制を維持したまま、自らを「修正」する道を選びました。"
                }
            ]
        },
        {
            stage: "STAGE 2：1970年代 経済の停滞",
            situation: "【緊急事態】「大きな政府」による手厚い保護や公共事業のやりすぎで、国の財政は赤字だらけ。石油危機も重なり経済が停滞しています！どうしますか？",
            options: [
                {
                    thinker: "ケインズ派",
                    text: "まだ足りない！もっと政府の借金を増やしてでも、公共事業を拡大し続けよう。",
                    isCorrect: false,
                    feedback: "【史実と異なります】財政赤字がさらに膨れ上がり、インフレ（物価上昇）が止まらなくなってしまいました。"
                },
                {
                    thinker: "フリードマン派",
                    text: "政府の介入を減らそう！公的企業の民営化や規制緩和を行い、再び市場の競争力を取り戻すんだ。",
                    isCorrect: true,
                    feedback: "【正解！】「マネタリズム」を背景にした「新自由主義」の台頭です。再び「小さな政府」へと舵を切り、市場機能の回復を図りました。"
                }
            ]
        },
        {
            stage: "STAGE 3：1980年代 社会主義の行き詰まり",
            situation: "【緊急事態】国家がすべてを決める「計画経済」を長年続けた結果、労働者の意欲が下がり、シュンペーターの言う「イノベーション」が全く生まれなくなってしまいました！",
            options: [
                {
                    thinker: "保守派（計画経済の維持）",
                    text: "計画が甘いからだ。国家による管理と監視をさらに徹底し、国民を厳しく指導しよう。",
                    isCorrect: false,
                    feedback: "【史実と異なります】社会の変化に対応できず、体制が完全に硬直化。のちにソ連が崩壊したように、この道は行き詰まりました。"
                },
                {
                    thinker: "改革派（市場原理の導入）",
                    text: "政治体制は維持しつつも、経済には資本主義の「市場原理」や競争を取り入れよう。",
                    isCorrect: true,
                    feedback: "【正解！】中国の「社会主義市場経済」や「改革開放政策」がこれにあたります。実質的に資本主義のメカニズムを取り入れた国だけが、生き残り成長を遂げました。"
                }
            ]
        }
    ];

    let currentStage = 0;

    const titleEl = document.getElementById('stage-title');
    const situationEl = document.getElementById('situation-box');
    const optionsContainer = document.getElementById('options-container');
    const feedbackBox = document.getElementById('feedback-box');
    const nextBtn = document.getElementById('next-btn');
    const finishScreen = document.getElementById('finish-screen');

    function loadStage() {
        feedbackBox.style.display = 'none';
        nextBtn.style.display = 'none';
        optionsContainer.innerHTML = '';
        
        const stageData = scenarios[currentStage];
        titleEl.textContent = stageData.stage;
        situationEl.textContent = stageData.situation;

        stageData.options.forEach((option) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerHTML = `<strong>${option.thinker}</strong>${option.text}`;
            btn.onclick = () => selectOption(option, btn);
            optionsContainer.appendChild(btn);
        });
    }

    function selectOption(option, btnElement) {
        // 全ボタンを無効化
        const buttons = document.querySelectorAll('.option-btn');
        buttons.forEach(b => {
            b.disabled = true;
            b.style.opacity = '0.5';
        });
        btnElement.style.opacity = '1';

        // フィードバックの表示
        feedbackBox.style.display = 'block';
        feedbackBox.innerHTML = `<strong>${option.isCorrect ? '〇' : '×'}</strong><br>${option.feedback}`;
        
        if (option.isCorrect) {
            feedbackBox.className = 'correct';
            nextBtn.style.display = 'block';
        } else {
            feedbackBox.className = 'incorrect';
            // 間違えた場合はもう一度選べるようにする（リトライ機能）
            setTimeout(() => {
                buttons.forEach(b => {
                    b.disabled = false;
                    b.style.opacity = '1';
                });
                feedbackBox.style.display = 'none';
            }, 3000);
        }
    }

    nextBtn.onclick = () => {
        currentStage++;
        if (currentStage < scenarios.length) {
            loadStage();
        } else {
            // ゲームクリア画面
            titleEl.style.display = 'none';
            situationEl.style.display = 'none';
            optionsContainer.style.display = 'none';
            feedbackBox.style.display = 'none';
            nextBtn.style.display = 'none';
            finishScreen.style.display = 'block';
        }
    };

    // 初期化
    loadStage();
</script>

</body>
</html>
